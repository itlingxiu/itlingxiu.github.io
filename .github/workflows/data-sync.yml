name: Daily Quiz Sync

on:
  schedule:
    # 北京时间每天 00:30
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync interview & algorithm data
        run: |
          node scripts/quiz-sync.mjs
          node scripts/algo-sync.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/quiz-sync.json public/data/algo-sync.json
          git diff --staged --quiet || git commit -m "chore: daily sync quiz & algo from LeetCode & Nowcoder"
          git push
